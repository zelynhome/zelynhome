<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="ZELYN — 300TC cotton percale fitted sheets deep-fit engineered for European mattresses." />
<title>ZELYN — Cotton Percale Bedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f3ec;
  --paper:#ffffff;
  --ink:#181b1a;
  --muted:#58605d;
  --line:#e4e0d4;
  --accent:#4f6f63;
  --radius:16px;
  --max:1120px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui,sans-serif;
  line-height:1.6;
}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;}
.wrap{width:min(var(--max),calc(100% - 40px));margin:auto;}

header{
  position:sticky;
  top:0;
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:72px;
}
.brand{
  font-family:Fraunces,serif;
  letter-spacing:.16em;
  text-transform:uppercase;
  font-size:20px;
}

.hero{
  padding:80px 0;
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:40px;
  align-items:center;
}
.hero h1{
  font-family:Fraunces,serif;
  font-size:clamp(34px,4vw,52px);
  line-height:1.1;
  margin-bottom:18px;
}
.hero p{
  color:var(--muted);
  margin-bottom:24px;
}
.btn{
  display:inline-block;
  padding:14px 22px;
  background:var(--accent);
  color:white;
  border-radius:999px;
  font-weight:600;
}

.hero-image{
  border-radius:var(--radius);
  overflow:hidden;
  border:1px solid var(--line);
}

@media(max-width:900px){
  .hero{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="wrap">
    <nav>
      <div class="brand">ZELYN</div>
      <div>EU Queen 160×200×35</div>
    </nav>
  </div>
</header>

<main class="wrap">

<section class="hero">

  <div>
    <h1>Deep-fit fitted sheets that stay smooth all night.</h1>
    <p>
      Crisp 300TC cotton percale engineered for European mattresses and topper combinations.
      Minimalist. Durable. Designed for everyday comfort.
    </p>
    <a href="#product" class="btn">Shop fitted sheet — €29</a>
  </div>

  <div class="hero-image">
    <img 
      src="assets/images/hero-160x200.webp" 
      alt="ZELYN white cotton percale fitted sheet on EU Queen mattress"
      loading="eager">
  </div>

</section>

</main>

</body>
</html>
